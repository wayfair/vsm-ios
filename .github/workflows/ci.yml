name: ci

on: # Rebuild any PRs and main branch changes
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test-vsm:
    runs-on: macos-26
    steps:
      - name: Prepare Xcode
        uses: maxim-lobanov/setup-xcode@v1 # https://github.com/marketplace/actions/setup-xcode-version
        with:
          # NOTE: Xcode 26.2 has a known bug where simulator test runners hang/fail
          # (FB21363735). Pinned to 26.1 for simulator destinations until Apple fixes it.
          xcode-version: '26.1'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build and Test VSM on macOS (Apple Silicon)
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme VSM \
            -destination "platform=macOS,arch=arm64" \
            | xcbeautify

      - name: Boot iOS Simulator
        run: xcrun simctl bootstatus "iPhone 17" -b

      - name: Build and Test VSM on iOS
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme VSM \
            -destination "platform=iOS Simulator,OS=26.1,name=iPhone 17" \
            -sdk iphonesimulator \
            | xcbeautify

      - name: Boot watchOS Simulator
        run: xcrun simctl bootstatus "Apple Watch Series 11 (46mm)" -b

      - name: Build and Test VSM on watchOS
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme VSM \
            -destination "platform=watchOS Simulator,OS=26.1,name=Apple Watch Series 11 (46mm)" \
            -sdk watchsimulator \
            | xcbeautify

      - name: Boot tvOS Simulator
        run: xcrun simctl bootstatus "Apple TV 4K (3rd generation) (at 1080p)" -b

      - name: Build and Test VSM on tvOS
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme VSM \
            -destination "platform=tvOS Simulator,OS=26.1,name=Apple TV 4K (3rd generation) (at 1080p)" \
            -sdk appletvsimulator \
            | xcbeautify

      - name: Boot visionOS Simulator
        run: xcrun simctl bootstatus "Apple Vision Pro" -b

      - name: Build and Test VSM on visionOS
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme VSM \
            -destination "platform=visionOS Simulator,OS=26.1,name=Apple Vision Pro" \
            -sdk xrsimulator \
            | xcbeautify

