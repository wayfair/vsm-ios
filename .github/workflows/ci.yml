name: ci

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test-vsm:
    runs-on: macos-26
    steps:
      - name: Prepare Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # NOTE: Xcode 26.2 has a known bug where simulator test runners hang/fail
          # (FB21363735). Pinned to 26.1 for simulator destinations until Apple fixes it.
          xcode-version: '26.3'

      - name: Checkout
        uses: actions/checkout@v4

      # xcbeautify off temporarily for raw xcodebuild logs (restore after debugging).
      # - name: Install xcbeautify
      #   run: brew install xcbeautify

      # SPM: scheme "VSM" is the library product only and has no Test action; "VSM-Package" runs package tests.
      - name: Build and Test VSM on macOS (Apple Silicon)
        run: |
          set -o pipefail
          xcodebuild build-for-testing test \
            -scheme VSM-Package \
            -destination "platform=macOS,arch=arm64" \
            -skipPackagePluginValidation

      - name: Boot iOS Simulator
        run: xcrun simctl bootstatus "iPhone 17" -b

      - name: Build and Test VSM on iOS
        run: |
          set -o pipefail
          xcodebuild build-for-testing test \
            -scheme VSM-Package \
            -destination "platform=iOS Simulator,OS=26.2,name=iPhone 17" \
            -sdk iphonesimulator \
            -skipPackagePluginValidation

      - name: Boot watchOS Simulator
        run: xcrun simctl bootstatus "Apple Watch Series 11 (46mm)" -b

      - name: Build and Test VSM on watchOS
        run: |
          set -o pipefail
          xcodebuild build-for-testing test \
            -scheme VSM-Package \
            -destination "platform=watchOS Simulator,OS=26.2,name=Apple Watch Series 11 (46mm)" \
            -sdk watchsimulator \
            -skipPackagePluginValidation

      - name: Boot tvOS Simulator
        run: xcrun simctl bootstatus "Apple TV 4K (3rd generation) (at 1080p)" -b

      - name: Build and Test VSM on tvOS
        run: |
          set -o pipefail
          xcodebuild build-for-testing test \
            -scheme VSM-Package \
            -destination "platform=tvOS Simulator,OS=26.2,name=Apple TV 4K (3rd generation) (at 1080p)" \
            -sdk appletvsimulator \
            -skipPackagePluginValidation

# These two build jobs are disabled because the visionOS simulator does not run well on GitHub CI.
# Usage on visionOS is low so for now. They will be re-enabled when the visionOS simulator can run 
