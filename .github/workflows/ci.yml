name: ci

on: # Rebuild any PRs and main branch changes
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test-vsm:
    runs-on: macos-26 # Apple Silicon (arm64), Xcode 26 default
    steps:
      - name: Prepare Xcode
        uses: maxim-lobanov/setup-xcode@v1 # https://github.com/marketplace/actions/setup-xcode-version
        with:
          xcode-version: '26.2' # Pinned: default on macos-26 is 26.2; update as new stable releases land

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Test VSM on macOS (Apple Silicon)
        uses: sersoft-gmbh/xcodebuild-action@v3 # https://github.com/marketplace/actions/xcodebuild-action
        with:
          spm-package: ./
          scheme: VSM
          destination: platform=macOS,arch=arm64
          action: test

      - name: Build and Test VSM on Mac Catalyst (Apple Silicon)
        uses: sersoft-gmbh/xcodebuild-action@v3 # https://github.com/marketplace/actions/xcodebuild-action
        with:
          spm-package: ./
          scheme: VSM
          destination: platform=macOS,arch=arm64,variant=Mac Catalyst
          action: test

      - name: Build and Test VSM on iOS
        uses: sersoft-gmbh/xcodebuild-action@v3 # https://github.com/marketplace/actions/xcodebuild-action
        with:
          spm-package: ./
          scheme: VSM
          destination: platform=iOS Simulator,OS=26.2,name=iPhone 16
          action: test

      - name: Build and Test VSM on watchOS
        uses: sersoft-gmbh/xcodebuild-action@v3 # https://github.com/marketplace/actions/xcodebuild-action
        with:
          spm-package: ./
          scheme: VSM
          destination: platform=watchOS Simulator,OS=26.2,name=Apple Watch Series 10 (46mm)
          action: test

      - name: Build and Test VSM on tvOS
        uses: sersoft-gmbh/xcodebuild-action@v3 # https://github.com/marketplace/actions/xcodebuild-action
        with:
          spm-package: ./
          scheme: VSM
          destination: platform=tvOS Simulator,OS=26.2,name=Apple TV 4K (3rd generation) (at 1080p)
          action: test

      - name: Build and Test VSM on visionOS
        uses: sersoft-gmbh/xcodebuild-action@v3 # https://github.com/marketplace/actions/xcodebuild-action
        with:
          spm-package: ./
          scheme: VSM
          destination: platform=visionOS Simulator,OS=26.2,name=Apple Vision Pro
          action: test

  # The following jobs are disabled until further notice to unblock work
  # Xcode currently has UI test runtime issues since Xcode 14.3
